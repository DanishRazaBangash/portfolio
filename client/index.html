    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
      /* Pre-paint background to prevent flash on load */
      html { background: #e8e8ec; }
      html.dark { background: #030303; }
    </style>
    <!-- Apply saved theme before first paint to prevent colour flash -->
    <script>
      try {
        var t = JSON.parse(localStorage.getItem('portfolio-theme') || '{}')
        var theme = (t.state && t.state.theme) || 'dark'
        if (theme === 'dark') document.documentElement.classList.add('dark')
      } catch (e) {
        document.documentElement.classList.add('dark')
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
